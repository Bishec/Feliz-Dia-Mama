<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para Mamá | Un Universo de Amor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Montserrat:wght@200;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
</head>

<body>
    <div id="canvas-container"></div>

    <div id="overlay">
        <div id="intro">
            <h1 class="cinematic-title">Para ti, mamá</h1>
            <button id="start-btn" class="glass-btn">Iniciar Experiencia</button>
        </div>

        <div id="content" class="hidden">
            <div class="message-container">
                <h2 class="fade-in">Feliz Día, Mamá</h2>
                <p class="fade-in delay-1">No soy experto en palabras bonitas, pero hoy hice esto para que sepas que te
                    pienso.</p>
                <div class="divider fade-in delay-2"></div>
                <p class="quote fade-in delay-3">"Haz clic en los stickers. Hay algo para ti." 🧡</p>
            </div>
        </div>
    </div>

    <div id="popup-overlay">
        <div id="popup-card">
            <div id="popup-sticker-circle">
                <span id="popup-emoji"></span>
            </div>
            <div id="popup-title"></div>
            <div id="popup-message"></div>
            <button id="popup-close">Cerrar ✦</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
